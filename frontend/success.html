<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkLoom - Order Success</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #FAF6EE;
      font-family: 'Outfit', sans-serif;
      color: #2C1810;
    }
    .success-container {
      text-align: center;
      background: white;
      padding: 60px 40px;
      border-radius: 28px;
      box-shadow: 0 15px 45px rgba(66, 27, 18, 0.05);
      border: 1px solid #E8DFD3;
      max-width: 500px;
      width: 90%;
      animation: floatIn 0.8s ease-out;
    }
    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(207, 158, 40, 0.1);
      color: #CF9E28;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin: 0 auto 30px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #421B12;
      font-size: 32px;
      margin-bottom: 12px;
    }
    p {
      color: #7A695E;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 40px;
      font-weight: 300;
    }
    .btn {
      display: inline-block;
      padding: 16px 36px;
      background: #421B12;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(66, 27, 18, 0.15);
    }
    .btn:hover {
      background: #CF9E28;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(207, 158, 40, 0.3);
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div class="success-container">
    <div class="checkmark">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1>Masterpiece Secured</h1>
    <p>Thank you for supporting heritage craft. Your order has been placed successfully. Generation-skilled artisans are already preparing your package.</p>
    <a href="dashboard.html" class="btn">View Order History</a>
  </div>
</body>
</html>
