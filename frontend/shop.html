<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>LinkLoom Shop</title>

<link rel="stylesheet"
href="css/shop.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav>

<h1>

LinkLoom Shop

</h1>

<div>

<input
id="search"
placeholder="Search products..."
onkeyup="searchProduct()"
>

<select
id="filter"
onchange="filterProducts()">

<option value="all">

</option>

<option value="Pottery">
Pottery
</option>

<option value="Textiles">
Textiles
</option>

<option value="Jewelry">
Jewelry
</option>

</select>

<button>

🛒 Cart:
<span id="cartCount">

0

</span>

</button>

</div>

</nav>


<div
class="products"
id="products">

</div>


<script src="js/shop.js">

</script>

</body>

</html>
